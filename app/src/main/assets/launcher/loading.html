<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      display: flex; align-items: center; justify-content: center;
      font-family: Arial, sans-serif;
      -webkit-user-select: none; user-select: none;
      overflow: hidden;
    }
    .card {
      background: linear-gradient(160deg, #12121c 0%, #0d0d16 100%);
      border: 1px solid rgba(143,180,48,0.18);
      border-radius: 20px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 480px;
      max-width: 88vw;
      box-shadow: 0 0 60px rgba(143,180,48,0.07), 0 24px 48px rgba(0,0,0,0.65);
    }
    .badge {
      background: rgba(143,180,48,0.10);
      border: 1px solid rgba(143,180,48,0.38);
      color: #8fb430;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      padding: 5px 16px;
      border-radius: 20px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .logo-frame {
      width: 96px; height: 96px;
      background: rgba(255,255,255,0.04);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .logo-frame img {
      width: 70px; height: 70px; object-fit: contain;
    }
    .server-name {
      color: #8fb430;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .server-sub {
      color: rgba(255,255,255,0.28);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .title {
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      color: rgba(255,255,255,0.42);
      font-size: 11px;
      text-align: center;
      line-height: 1.65;
      margin-bottom: 32px;
      max-width: 300px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(143,180,48,0.15);
      border-top-color: #8fb430;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wait-text {
      color: rgba(255,255,255,0.22);
      font-size: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Runtime</div>
    <div class="logo-frame">
      <img src="assets/logo.png" alt="Gotham City" />
    </div>
    <div class="server-name">Gotham City</div>
    <div class="server-sub">Roleplay</div>
    <div class="title">Carregando o ambiente do SA-MP</div>
    <div class="subtitle">Preparando interface, HUD e recursos antes de entrar no jogo.</div>
    <div class="spinner"></div>
    <div class="wait-text">Aguarde alguns instantes</div>
  </div>
</body>
</html>
