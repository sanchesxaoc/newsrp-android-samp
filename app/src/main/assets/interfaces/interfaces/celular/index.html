<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Phone RP</title>
    <style>
        @font-face {
            font-family: "HelveticaMedium";
            src: url("../../Fonts/HELVETICANEUELTCOM-MD.TTF") format("truetype");
        }

        @font-face {
            font-family: "PriceDown";
            src: url("../../Fonts/PRICEDOWNGTAVINT.TTF") format("truetype");
        }

        :root {
            --page-bg: radial-gradient(circle at 50% 18%, #20262d 0%, #101317 48%, #050608 100%);
            --phone-edge: linear-gradient(135deg, #101216 0%, #2a2d31 10%, #08090c 27%, #262a2f 48%, #07080b 70%, #1c1f24 88%, #08090b 100%);
            --screen-bg: radial-gradient(circle at 50% 18%, rgba(60, 89, 148, 0.16), transparent 28%), linear-gradient(180deg, #0b0c10 0%, #050608 100%);
            --text: #f6f7fb;
            --muted: rgba(246, 247, 251, 0.88);
            --shadow: 0 24px 50px rgba(0, 0, 0, 0.5);
            --nav-bg: rgba(0, 0, 0, 0.74);
            --nav-line: rgba(255, 255, 255, 0.08);
            --wa-green: #25d366;
            --wa-green-dark: #0e7b59;
            --ig-border: rgba(15, 15, 16, 0.08);
            --bank-red: #f1424c;
            --bank-dark: #101114;
            --stage-scale: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            color: var(--text);
            font-family: "HelveticaMedium", Arial, sans-serif;
        }

        body {
            display: grid;
            place-items: center;
        }

        input,
        textarea {
            user-select: text;
            -webkit-user-select: text;
        }

        button,
        input {
            font: inherit;
            color: inherit;
            border: 0;
            background: transparent;
            touch-action: manipulation;
        }

        body.preview {
            padding: 18px;
            background: var(--page-bg);
        }

        .screen,
        .app-window,
        .recents-overlay,
        .runtime-hub {
            contain: paint style;
        }

        .app-viewport,
        .home-shell,
        .recents-overlay {
            will-change: transform;
        }

        .app-body,
        .wa-thread,
        .wa-quick-row,
        .ig-stories,
        .ig-chip-row,
        .bank-shell,
        .utility-shell,
        .recents-overlay {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        body.runtime-app .phone {
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.34);
        }

        body.runtime-app .recents-overlay,
        body.runtime-app .runtime-hub {
            backdrop-filter: none;
        }

        body.runtime-app .recent-card,
        body.runtime-app .preview-toast,
        body.runtime-app .voice-fab,
        body.runtime-app .bank-card {
            box-shadow: none;
        }

        body.runtime-app .nav-glyph,
        body.runtime-app .preview-toast {
            transition: none;
        }

        body.runtime-lite .runtime-hub {
            background: rgba(7, 10, 15, 0.9);
        }

        body.runtime-lite .screen::before {
            opacity: 0.72;
        }

        .stage {
            width: 224px;
            height: 376px;
            transform: scale(var(--stage-scale));
            transform-origin: center center;
        }

        body.preview .stage {
            width: min(224px, 100%);
            aspect-ratio: 224 / 376;
            height: auto;
            transform: none;
        }

        .phone {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 7px;
            border-radius: 35px;
            background: var(--phone-edge);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .phone::before {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: 33px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .phone::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 29px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }

        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 29px;
            overflow: hidden;
            background: var(--screen-bg);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 14%),
                radial-gradient(circle at 50% 94%, rgba(61, 98, 193, 0.22), transparent 24%);
            pointer-events: none;
        }

        .dynamic-island {
            position: absolute;
            top: 9px;
            left: 50%;
            z-index: 10;
            width: 72px;
            height: 15px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: linear-gradient(180deg, #090a0d, #010204);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.025);
        }

        .dynamic-island::before {
            content: "";
            position: absolute;
            left: 18px;
            top: 5px;
            width: 20px;
            height: 5px;
            border-radius: 999px;
            background: rgba(16, 18, 23, 0.95);
        }

        .dynamic-island::after {
            content: "";
            position: absolute;
            right: 18px;
            top: 4px;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #324f8d, #0c152f 78%);
            opacity: 0.9;
        }

        .statusbar {
            position: absolute;
            top: 16px;
            left: 15px;
            right: 15px;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 8px;
            font-weight: 600;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-mark {
            width: 5px;
            height: 5px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.96);
        }

        .battery {
            position: relative;
            width: 14px;
            height: 7px;
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.82);
        }

        .battery::before {
            content: "";
            position: absolute;
            top: 1px;
            right: -2px;
            width: 2px;
            height: 3px;
            border-radius: 0 2px 2px 0;
            background: rgba(255, 255, 255, 0.82);
        }

        .battery::after {
            content: "";
            position: absolute;
            inset: 1px;
            width: 75%;
            border-radius: 1px;
            background: #9bff7a;
        }

        .home-shell,
        .app-viewport,
        .recents-overlay {
            position: absolute;
            left: 0;
            right: 0;
            top: 34px;
            bottom: 32px;
        }

        .home-shell.hidden,
        .app-viewport.hidden,
        .recents-overlay.hidden {
            display: none;
        }

        .apps-grid {
            position: absolute;
            top: 12px;
            left: 17px;
            right: 17px;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            column-gap: 8px;
            row-gap: 10px;
        }

        .app,
        .single-app {
            appearance: none;
            display: grid;
            justify-items: center;
            gap: 3px;
            padding: 0;
        }

        .icon-tile {
            width: 33px;
            height: 33px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                0 6px 10px rgba(0, 0, 0, 0.22);
        }

        .icon-tile svg {
            width: 69%;
            height: 69%;
            display: block;
        }

        .app-label {
            font-size: 5px;
            line-height: 1.05;
            color: var(--muted);
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.95);
        }

        .single-app {
            position: absolute;
            left: 17px;
            bottom: 40px;
            z-index: 3;
        }

        .brand {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 30px;
            z-index: 1;
            display: grid;
            justify-items: center;
            pointer-events: none;
            opacity: 0.15;
        }

        .brand-word {
            font-family: "PriceDown", sans-serif;
            font-size: 12px;
            line-height: 0.88;
            letter-spacing: 0.16em;
            color: #1b2544;
            text-shadow: 0 0 12px rgba(9, 14, 24, 0.92);
        }

        .pager {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 3px;
        }

        .pager span {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.24);
        }

        .pager span.active {
            background: rgba(255, 255, 255, 0.72);
        }

        .app:active .icon-tile,
        .single-app:active .icon-tile,
        .nav-button:active .nav-glyph,
        .surface-button:active,
        .mini-action:active,
        .ig-icon:active,
        .wa-chat-row:active {
            transform: scale(0.95);
        }

        .app-window {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: #090a0d;
            color: #fff;
        }

        .app-body {
            position: absolute;
            inset: 0;
            overflow: auto;
        }

        .app-body::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .app-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px 9px;
        }

        .app-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .app-subtitle {
            font-size: 6px;
            opacity: 0.72;
            margin-top: 2px;
        }

        .app-tools {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 8px;
        }

        .mini-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
        }

        .mini-line {
            width: 10px;
            height: 2px;
            border-radius: 999px;
            background: currentColor;
        }

        .whatsapp-window {
            background: #0b141a;
        }

        .whatsapp-topbar {
            background: linear-gradient(180deg, #233138, #1c272d);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .whatsapp-title {
            font-size: 11px;
            font-weight: 700;
        }

        .wa-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            padding: 0 8px;
            height: 22px;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.6);
            font-size: 5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .wa-tabs span.active {
            color: #dff7ef;
        }

        .wa-list {
            padding: 3px 0 10px;
        }

        .wa-chat-row {
            width: 100%;
            display: grid;
            grid-template-columns: 34px 1fr auto;
            gap: 8px;
            padding: 8px 10px;
            align-items: center;
            color: #f7fbfd;
            text-align: left;
            cursor: pointer;
        }

        .wa-chat-row + .wa-chat-row {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .wa-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .wa-avatar.green { background: linear-gradient(180deg, #28d365, #167d42); }
        .wa-avatar.pink { background: linear-gradient(180deg, #ff6b98, #dc4572); }
        .wa-avatar.blue { background: linear-gradient(180deg, #59b7ff, #246ae3); }
        .wa-avatar.red { background: linear-gradient(180deg, #ff6c73, #d94550); }

        .wa-main {
            min-width: 0;
        }

        .wa-name {
            font-size: 8px;
            font-weight: 700;
            color: #f4f7fa;
        }

        .wa-preview {
            margin-top: 2px;
            font-size: 6px;
            color: rgba(255, 255, 255, 0.62);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .wa-meta {
            display: grid;
            justify-items: end;
            gap: 4px;
        }

        .wa-time {
            font-size: 5.5px;
            color: rgba(255, 255, 255, 0.54);
        }

        .wa-badge {
            min-width: 11px;
            height: 11px;
            padding: 0 3px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: var(--wa-green);
            color: #081510;
            font-size: 5px;
            font-weight: 700;
        }

        .wa-chat-screen {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
        }

        .wa-chat-top {
            background: linear-gradient(180deg, #1f2c34, #1a252b);
            padding: 9px 10px;
            display: grid;
            grid-template-columns: 30px 1fr auto;
            gap: 7px;
            align-items: center;
        }

        .surface-button {
            min-height: 24px;
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
        }

        .surface-button.slim {
            min-height: 22px;
            padding: 0 8px;
            font-size: 6px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .wa-thread {
            padding: 10px;
            overflow: auto;
            display: grid;
            align-content: start;
            gap: 6px;
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.04), transparent 18%),
                radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.03), transparent 16%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.06), transparent 14%),
                #0b141a;
        }

        .wa-thread::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .wa-message {
            max-width: 82%;
            padding: 7px 8px 8px;
            border-radius: 10px;
            font-size: 6.5px;
            line-height: 1.45;
            letter-spacing: 0.01em;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
        }

        .wa-message.them {
            justify-self: start;
            background: #202c33;
            border-top-left-radius: 4px;
        }

        .wa-message.me {
            justify-self: end;
            background: #134d37;
            border-top-right-radius: 4px;
        }

        .wa-message small {
            display: block;
            margin-top: 4px;
            font-size: 5px;
            opacity: 0.6;
            text-align: right;
        }

        .wa-quick-row {
            display: flex;
            gap: 5px;
            overflow: auto;
            padding: 0 10px 6px;
            background: #0b141a;
        }

        .wa-quick-row::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .mini-action {
            flex: none;
            min-height: 18px;
            padding: 0 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.07);
            font-size: 5.5px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
        }

        .wa-composer {
            padding: 7px 10px 9px;
            background: #111b21;
            display: grid;
            grid-template-columns: 1fr 24px;
            gap: 6px;
            align-items: center;
        }

        .wa-input {
            min-height: 24px;
            padding: 0 9px;
            border-radius: 999px;
            background: #202c33;
            color: #fff;
            font-size: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .wa-input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .wa-send {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--wa-green);
            color: #0b2017;
            font-size: 7px;
            font-weight: 700;
            cursor: pointer;
        }

        .instagram-window {
            background: #ffffff;
            color: #0f1012;
        }

        .ig-topbar {
            border-bottom: 1px solid var(--ig-border);
            background: #ffffff;
        }

        .ig-logo {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .ig-stories {
            display: flex;
            gap: 8px;
            padding: 9px 9px 8px;
            overflow: auto;
            border-bottom: 1px solid var(--ig-border);
        }

        .ig-stories::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .ig-story {
            width: 40px;
            flex: none;
            display: grid;
            justify-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .ig-ring {
            width: 40px;
            height: 40px;
            padding: 2px;
            border-radius: 50%;
            background: conic-gradient(from 200deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5, #feda75);
        }

        .ig-ring-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 2px;
            background: #fff;
        }

        .ig-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }

        .ig-story span {
            font-size: 5px;
            white-space: nowrap;
            color: #25272c;
        }

        .ig-feed {
            padding-bottom: 16px;
        }

        .ig-post {
            border-bottom: 1px solid var(--ig-border);
        }

        .ig-post-head {
            display: grid;
            grid-template-columns: 24px 1fr auto;
            align-items: center;
            gap: 7px;
            padding: 8px 9px;
        }

        .ig-post-head strong {
            font-size: 7px;
        }

        .ig-post-head small {
            display: block;
            margin-top: 1px;
            font-size: 5px;
            color: rgba(15, 16, 18, 0.54);
        }

        .ig-post-media {
            aspect-ratio: 1 / 1;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .ig-post-media::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.08) 100%);
        }

        .ig-media-badge {
            position: absolute;
            left: 10px;
            bottom: 10px;
            z-index: 1;
            padding: 4px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            color: #131418;
            font-size: 5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .ig-post-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 9px 6px;
        }

        .ig-action-left {
            display: flex;
            gap: 8px;
        }

        .ig-icon {
            cursor: pointer;
            font-size: 8px;
            font-weight: 700;
        }

        .ig-icon.liked {
            color: #e53357;
        }

        .ig-copy {
            padding: 0 9px 8px;
        }

        .ig-likes {
            font-size: 6px;
            font-weight: 700;
        }

        .ig-caption {
            margin-top: 4px;
            font-size: 6px;
            line-height: 1.45;
            color: #1a1c20;
        }

        .ig-caption strong {
            margin-right: 4px;
        }

        .ig-chip-row {
            display: flex;
            gap: 6px;
            margin-top: 7px;
            overflow: auto;
        }

        .ig-chip-row::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .ig-chip {
            flex: none;
            min-height: 18px;
            padding: 0 8px;
            border-radius: 999px;
            background: #f2f3f6;
            color: #111216;
            font-size: 5.5px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
        }

        .ig-bottom-nav {
            position: sticky;
            bottom: 0;
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            padding: 7px 0;
            border-top: 1px solid var(--ig-border);
            background: rgba(255, 255, 255, 0.96);
            font-size: 8px;
            text-align: center;
            color: #17181b;
        }

        .bank-window {
            background:
                radial-gradient(circle at top right, rgba(241, 66, 76, 0.22), transparent 30%),
                linear-gradient(180deg, #101115 0%, #0a0b0d 100%);
        }

        .bank-topbar {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
        }

        .bank-mark {
            width: 18px;
            height: 18px;
            border-radius: 6px;
            background: linear-gradient(180deg, #ff525f, #c81b29);
            display: grid;
            place-items: center;
            font-size: 8px;
            font-weight: 700;
        }

        .bank-shell {
            padding: 10px;
            overflow: auto;
            display: grid;
            gap: 9px;
        }

        .bank-shell::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .bank-tabs {
            display: flex;
            gap: 6px;
        }

        .bank-tab {
            min-height: 19px;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 5.5px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .bank-tab.active {
            background: rgba(241, 66, 76, 0.16);
            border-color: rgba(241, 66, 76, 0.3);
        }

        .bank-card {
            padding: 11px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(252, 76, 85, 0.94), rgba(150, 16, 23, 0.96));
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
        }

            text-align: left;
            cursor: pointer;
        }

        .map-chip strong {

            letter-spacing: 0;
            text-transform: none;
            margin-top: 2px;
        }

        .music-station-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 7px;
        }

            padding: 10px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.07);

        .music-station strong {

                linear-gradient(180deg, #101216 0%, #08090b 100%);
        }

        .calc-shell {
            padding: 12px;
            display: grid;
            gap: 9px;
            align-content: start;
        }

        .calc-display {
            min-height: 78px;
            padding: 14px 12px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(242, 245, 252, 0.12), rgba(242, 245, 252, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: grid;
            align-content: end;
            justify-items: end;
        }

        .calc-display small {
            font-size: 5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .calc-display strong {
            display: block;
            margin-top: 5px;
            font-size: 16px;
            line-height: 1;
            color: #ffffff;
            word-break: break-all;
        }

        .calc-keypad {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }

        .calc-key {
            min-height: 34px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .calc-key.operator {
            background: linear-gradient(180deg, #ff8c3a, #ff5f2b);
        }

        .calc-key.function {
            background: rgba(255, 255, 255, 0.16);
        }
    </style>

    function currentScreen() {
        return state.history[state.history.length - 1];
    }

    function callBridge(method, ...args) {
        if (!bridge || typeof bridge[method] !== "function") {
            return null;
        }
        try {
            return bridge[method](...args);
        } catch (error) {
            return null;
        }
    }

    function showPreviewToast(text) {
        const toast = document.getElementById("previewToast");
        toast.textContent = text;
        toast.classList.add("visible");
        if (toastTimer) {
            clearTimeout(toastTimer);
        }
        toastTimer = setTimeout(() => {
            toast.classList.remove("visible");
        }, 1300);
    }

    function dispatchCommand(command, label) {
        if (command) {
            callBridge("runCommand", command);
        }
        if (isPreview) {
            showPreviewToast(label || command || "Comando executado");
        }
    }

    function openInventory() {
        callBridge("openInventory");
        if (isPreview) {
            showPreviewToast("Inventario acionado");
        }
    }

    function closePhone() {
        callBridge("closePhone");
        if (isPreview) {
            showPreviewToast("Fechar celular");
        }
    }

    function rememberRecent(screen) {
        const appKey = topLevelScreens[screen];
        if (!appKey) {
            return;
        }
        state.recentApps = [appKey, ...state.recentApps.filter((item) => item !== appKey)].slice(0, 4);
    }

    function goHome() {
        state.history = ["home"];
        state.recentsVisible = false;
        render();
    }

    function openScreen(screen) {
        if (currentScreen() === screen) {
            return;
        }
        state.history.push(screen);
        state.recentsVisible = false;
        rememberRecent(screen);
        render();
    }

    function goBack() {
        if (state.recentsVisible) {
            state.recentsVisible = false;
            render();
            return;
        }

        if (state.history.length > 1) {
            state.history.pop();
            render();
            return;
        }

        closePhone();
    }

    function toggleRecents() {
        state.recentsVisible = !state.recentsVisible;
        renderRecents();
    }

    function activateApp(config) {
        if (config.screen) {
            openScreen(config.screen);
            return;
        }
        if (config.mode === "inventory") {
            openInventory();
            return;
        }
        if (config.command) {
            dispatchCommand(config.command, `${config.label || "App"} acionado`);
        }
    }

    function buildHomeButton(config, className) {
        const button = document.createElement("button");
        button.className = className;
        button.type = "button";
        button.dataset.appKey = config.key;
        button.setAttribute("aria-label", config.label || "Atalho");
        button.innerHTML = `
            <div class="icon-tile ${config.className}">${iconLibrary[config.icon] || ""}</div>
            ${config.label ? `<span class="app-label">${config.label}</span>` : ""}
        `;
        return button;
    }

        const grid = document.getElementById("appsGrid");

        homeApps.forEach((app) => grid.appendChild(buildHomeButton(app, "app")));
        single.appendChild(buildHomeButton(singleApp, "app"));
    }

            attrs.push(`data-open-screen="${action.screen}"`);
        }
        if (action.action === "inventory") {

        if (action.liveTheme) {
            attrs.push(`data-live-theme="${action.liveTheme}"`);

        if (action.liveAnnounce) {
            attrs.push("data-live-announce=\"true\"");
        }
        return attrs.join(" ");
    }

    function mountAudioStudio(autoplay) {
        const meter = document.getElementById("audioMeterFill");
        const roomLabel = document.getElementById("audioRoomLabel");
        if (!meter || !roomLabel) {
            if (audioMeterTimer) {
                window.clearInterval(audioMeterTimer);
                audioMeterTimer = null;
            }
            return;
        }

        if (!phoneAudioStudio) {
            phoneAudioStudio = window.XyronExperiences.createSpatialStudio({});
            phoneAudioStudio.setRoomPreset("club");
        }

        if (autoplay && phoneAudioStudio.resume) {
            phoneAudioStudio.resume();
        }
        if (autoplay && phoneAudioStudio.setPlaying) {
            phoneAudioStudio.setPlaying(true);
        }

        if (audioMeterTimer) {
            window.clearInterval(audioMeterTimer);
        }

        audioMeterTimer = window.setInterval(() => {
            if (!phoneAudioStudio) {
                return;
            }
            const level = phoneAudioStudio.getMeterLevel();
            meter.style.width = `${Math.max(12, Math.round(level * 100))}%`;
            const room = phoneAudioStudio.getRoomName ? phoneAudioStudio.getRoomName() : "Club";
            roomLabel.textContent = phoneAudioStudio.isPlaying()
                ? `${room} | fonte ativa no painel`
                : `${room} | em espera`;
        }, runtimeLowRamMode ? 260 : 180);
    }

    function formatCalculatorValue(value) {
        if (!Number.isFinite(value)) {
            return "Erro";
        }
        if (Math.abs(value) >= 1e9 || (Math.abs(value) > 0 && Math.abs(value) < 1e-6)) {
            return value.toExponential(4);
        }
        return String(Number(value.toFixed(6)));
    }

    function readCalculatorNumber() {
        const parsed = Number(state.calcDisplay);
        return Number.isFinite(parsed) ? parsed : 0;
    }

    function applyCalculatorOperation(left, right, operator) {
        if (operator === "+") {
            return left + right;
        }
        if (operator === "-") {
            return left - right;
        }
        if (operator === "*") {
            return left * right;
        }
        if (operator === "/") {
            return right === 0 ? Number.NaN : left / right;
        }
        return right;
    }

    function handleCalculatorInput(key) {
        if (state.calcDisplay === "Erro" && key !== "clear") {
            state.calcDisplay = "0";
            state.calcStoredValue = null;
            state.calcOperator = null;
            state.calcReplaceDisplay = false;
        }

        if (key === "clear") {
            state.calcDisplay = "0";
            state.calcStoredValue = null;
            state.calcOperator = null;
            state.calcReplaceDisplay = false;
            renderCurrentScreen();
            return;
        }

        if (key === "delete") {
            if (state.calcReplaceDisplay) {
                state.calcDisplay = "0";
                state.calcReplaceDisplay = false;
            } else {
                state.calcDisplay = state.calcDisplay.length > 1 ? state.calcDisplay.slice(0, -1) : "0";
            }
            renderCurrentScreen();
            return;
        }

        if (["+", "-", "*", "/"].includes(key)) {
            const currentValue = readCalculatorNumber();
            if (state.calcStoredValue !== null && state.calcOperator && !state.calcReplaceDisplay) {
                const result = applyCalculatorOperation(state.calcStoredValue, currentValue, state.calcOperator);
                state.calcDisplay = formatCalculatorValue(result);
                state.calcStoredValue = Number.isFinite(result) ? result : null;
            } else {
                state.calcStoredValue = currentValue;
            }
            state.calcOperator = key;
            state.calcReplaceDisplay = true;
            renderCurrentScreen();
            return;
        }

        if (key === "equals") {
            if (state.calcOperator && state.calcStoredValue !== null) {
                const result = applyCalculatorOperation(state.calcStoredValue, readCalculatorNumber(), state.calcOperator);
                state.calcDisplay = formatCalculatorValue(result);
                state.calcStoredValue = null;
                state.calcOperator = null;
                state.calcReplaceDisplay = true;
                renderCurrentScreen();
            }
            return;
        }

        if (key === ".") {
            if (state.calcReplaceDisplay) {
                state.calcDisplay = "0.";
                state.calcReplaceDisplay = false;
            } else if (!state.calcDisplay.includes(".")) {
                state.calcDisplay += ".";
            }
            renderCurrentScreen();
            return;
        }

        if (/^\d+$/.test(key)) {
            if (state.calcReplaceDisplay || state.calcDisplay === "0") {
                state.calcDisplay = key;
            } else {
                state.calcDisplay += key;
            }
            state.calcReplaceDisplay = false;
            renderCurrentScreen();
        }
    }

    function renderCurrentScreen(force = false) {
        const screen = currentScreen();
        const appViewport = document.getElementById("appViewport");
        const homeShell = document.getElementById("homeShell");
        teardownRuntimeExperiences(screen);

        if (screen === "home") {
            homeShell.classList.remove("hidden");
            appViewport.classList.add("hidden");
            if (force || appViewport.innerHTML) {
                appViewport.innerHTML = "";
            }
            return;
        }

        homeShell.classList.add("hidden");
        appViewport.classList.remove("hidden");

        if (screen === "whatsapp-list") {
            appViewport.innerHTML = renderWhatsAppList();
            return;
        }
        if (screen === "whatsapp-chat") {
            appViewport.innerHTML = renderWhatsAppChat();
            return;
        }
        if (screen === "instagram-feed") {
            appViewport.innerHTML = renderInstagram();
            return;
        }
        if (screen === "bank-home") {
            appViewport.innerHTML = renderNubank();
            return;
        }
        if (screen === "maps-home") {
            appViewport.innerHTML = renderMapsHome();
            mountRouteMap();
            return;
        }
        if (screen === "music-home") {
            appViewport.innerHTML = renderMusicHome();
            mountAudioStudio(true);
            return;
        }
        if (screen === "calc-home") {
            appViewport.innerHTML = renderCalculator();
            return;
        }
        if (utilityApps[topLevelScreens[screen]]) {
            appViewport.innerHTML = renderUtilityApp(topLevelScreens[screen]);
            return;
        }

        appViewport.innerHTML = "";
    }

    function renderRecents(force = false) {
        const overlay = document.getElementById("recentsOverlay");
        const nextKey = state.recentsVisible
            ? `1:${state.recentApps.join("|")}`
            : "0";
        if (!force && recentsCacheKey === nextKey) {
            return;
        }
        recentsCacheKey = nextKey;
        if (!state.recentsVisible) {
            overlay.classList.add("hidden");
            overlay.innerHTML = "";
            return;
        }

        overlay.classList.remove("hidden");
        overlay.innerHTML = `
            <div class="recents-title">Apps recentes</div>
            ${state.recentApps.length ? state.recentApps.map((appKey) => `
                <button class="recent-card" type="button" data-recent-app="${appKey}">
                    <span class="recent-chip">${recentMeta[appKey].label}</span>
                    <strong>${recentMeta[appKey].label}</strong>
                    <p>${recentMeta[appKey].preview}</p>
                </button>
            `).join("") : `<div class="recents-empty">Abra alguns apps para popular os recentes do celular.</div>`}
        `;
    }

    function render() {
        renderCurrentScreen();
        renderRecents();
        syncRuntimeHud();
        refreshClock();
    }

    function syncRuntimeHud(force = false) {
        const status = document.getElementById("runtimeStatus");
        const copy = document.getElementById("runtimeCopy");
        const nextKey = `${currentScreen()}|${runtime.state.wsConnected ? "1" : "0"}|${state.liveAnnouncement}`;
        if (!force && runtimeHudCacheKey === nextKey) {
            return;
        }
        runtimeHudCacheKey = nextKey;
        document.body.classList.toggle("compact-runtime", currentScreen() !== "home");
        if (status) {
            status.textContent = runtime.state.wsConnected ? "Live Sync" : "Live Off";
        }
        if (copy) {
            copy.textContent = state.liveAnnouncement;
        }
    }

    function refreshClock(force = false) {
        const clockLabel = document.getElementById("clockLabel");
        if (!clockLabel) {
            return;
        }
        if (isPreview) {
            if (force || lastClockValue !== "01:27") {
                lastClockValue = "01:27";
                clockLabel.textContent = "01:27";
            }
            return;
        }
        const now = new Date();
        const value = now.toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
        });
        if (!force && lastClockValue === value) {
            return;
        }
        lastClockValue = value;
        clockLabel.textContent = value;
    }

    function applyStageScale() {
        if (isPreview) {
            document.documentElement.style.setProperty("--stage-scale", "1");
            return 1;
        }

        const scale = Math.min(
            window.innerWidth / stageBase.width,
            window.innerHeight / stageBase.height
        );
        const safeScale = Number.isFinite(scale) && scale > 0 ? scale : 1;
        document.documentElement.style.setProperty("--stage-scale", safeScale.toFixed(4));
        return safeScale;
    }

    function handleOverlayVisibilityChange(visible) {
        overlayVisible = !!visible;
        if (!overlayVisible) {
            if (phoneMapController && phoneMapController.pause) {
                phoneMapController.pause();
            }
            if (audioMeterTimer) {
                window.clearInterval(audioMeterTimer);
                audioMeterTimer = null;
            }
            if (phoneAudioStudio) {
                musicShouldResume = phoneAudioStudio.isPlaying ? phoneAudioStudio.isPlaying() : false;
                if (phoneAudioStudio.setPlaying) {
                    phoneAudioStudio.setPlaying(false);
                }
            }
            return;
        }

        if (currentScreen() === "maps-home" && phoneMapController && phoneMapController.resume) {
            phoneMapController.resume();
        }
        if (currentScreen() === "music-home" && phoneAudioStudio) {
            if (musicShouldResume && phoneAudioStudio.resume) {
                phoneAudioStudio.resume();
            }
            if (musicShouldResume && phoneAudioStudio.setPlaying) {
                phoneAudioStudio.setPlaying(true);
            }
            mountAudioStudio(false);
        }
        syncRuntimeHud(true);
    }

    function logRuntimeMetrics(source) {
        const scale = applyStageScale();
        const stage = document.querySelector(".stage");
        const rect = stage ? stage.getBoundingClientRect() : { width: 0, height: 0 };
        console.log(
            `[PhoneUI] ${source} preview=${isPreview} window=${Math.round(window.innerWidth)}x${Math.round(window.innerHeight)} stage=${Math.round(rect.width)}x${Math.round(rect.height)} scale=${scale.toFixed(3)} dpr=${window.devicePixelRatio}`
        );
    }

    async function enablePreviewHotReload() {
        if (!isPreview || typeof fetch !== "function") {
            return;
        }

        let baselineStamp = null;
        let checking = false;

        async function readStamp() {
            const response = await fetch(window.location.href, {
                method: "HEAD",
                cache: "no-store"
            });
            return response.headers.get("last-modified") || response.headers.get("etag");
        }

        try {
            baselineStamp = await readStamp();
        } catch (error) {
            return;
        }

        setInterval(async () => {
            if (checking || document.hidden) {
                return;
            }

            checking = true;
            try {
                const nextStamp = await readStamp();
                if (baselineStamp && nextStamp && baselineStamp !== nextStamp) {
                    window.location.reload();
                    return;
                }
                if (nextStamp) {
                    baselineStamp = nextStamp;
                }
            } catch (error) {
                // Ignore preview polling failures.
            } finally {
                checking = false;
            }
        }, 900);
    }

    document.addEventListener("click", (event) => {
        const navButton = event.target.closest("[data-nav]");
        if (navButton) {
            const nav = navButton.dataset.nav;
            if (nav === "back") {
                goBack();
            } else if (nav === "home") {
                goHome();
            } else if (nav === "recent") {
                toggleRecents();
            }
            return;
        }

        const appButton = event.target.closest("[data-app-key]");
        if (appButton) {
            const config = [...homeApps, singleApp].find((app) => app.key === appButton.dataset.appKey);
            if (config) {
                activateApp(config);
            }
            return;
        }

        const chatButton = event.target.closest("[data-chat-id]");
        if (chatButton) {
            state.activeChatId = chatButton.dataset.chatId;
            openScreen("whatsapp-chat");
            return;
        }

        const quickReply = event.target.closest("[data-quick-reply]");
        if (quickReply) {
            const input = document.getElementById("waDraft");
            if (input) {
                input.value = quickReply.dataset.quickReply;
                input.focus();
            }
            return;
        }

        const recentCard = event.target.closest("[data-recent-app]");
        if (recentCard) {
            const targetApp = recentCard.dataset.recentApp;
            const entryScreen = topLevelEntryScreen[targetApp];
            if (entryScreen) {
                state.history = ["home", entryScreen];
                state.recentsVisible = false;
                rememberRecent(entryScreen);
                render();
            }
            return;
        }

        const voiceButton = event.target.closest("#voiceFab");
        if (voiceButton) {
            runtime.startVoiceCommand("phone");
            if (isPreview) {
                showPreviewToast("Fale: ligar motor, abrir inventario, Maps, Music ou Nubank");
            }
            return;
        }

        const openScreenButton = event.target.closest("[data-open-screen]");
        if (openScreenButton) {
            openScreen(openScreenButton.dataset.openScreen);
            return;
        }

        const openInventoryButton = event.target.closest("[data-open-inventory]");
        if (openInventoryButton) {
            openInventory();
            return;
        }

        const calculatorButton = event.target.closest("[data-calc-key]");
        if (calculatorButton) {
            handleCalculatorInput(calculatorButton.dataset.calcKey);
            return;
        }

        const mapRouteButton = event.target.closest("[data-map-route]");
        if (mapRouteButton) {
            dispatchCommand("/gps", `Rota para ${mapRouteButton.dataset.mapRoute}`);
            return;
        }

        const mapZoomButton = event.target.closest("[data-map-zoom]");
        if (mapZoomButton && phoneMapController) {
            const delta = mapZoomButton.dataset.mapZoom === "in" ? 0.12 : -0.12;
            state.mapZoom = Math.max(0.75, Math.min(1.9, state.mapZoom + delta));
            phoneMapController.update({ zoom: state.mapZoom });
            return;
        }

        const audioToggle = event.target.closest("[data-audio-toggle]");
        if (audioToggle) {
            if (!phoneAudioStudio) {
                phoneAudioStudio = window.XyronExperiences.createSpatialStudio({});
            }
            if (phoneAudioStudio.resume) {
                phoneAudioStudio.resume();
            }
            const playing = phoneAudioStudio.toggle();
            showPreviewToast(playing ? "Music ligado" : "Music pausado");
            return;
        }

        const audioRoom = event.target.closest("[data-audio-room]");
        if (audioRoom) {
            if (!phoneAudioStudio) {
                phoneAudioStudio = window.XyronExperiences.createSpatialStudio({});
            }
            phoneAudioStudio.setRoomPreset(audioRoom.dataset.audioRoom);
            const label = document.getElementById("audioRoomLabel");
            if (label) {
                const roomName = phoneAudioStudio.getRoomName ? phoneAudioStudio.getRoomName() : audioRoom.dataset.audioRoom;
                label.textContent = `${roomName} | ambiente atualizado`;
            }
            return;
        }

        const liveTheme = event.target.closest("[data-live-theme]");
        if (liveTheme) {
            if (liveTheme.dataset.liveTheme === "amber") {
                document.documentElement.style.setProperty("--screen-bg", "radial-gradient(circle at 50% 18%, rgba(201, 132, 44, 0.18), transparent 28%), linear-gradient(180deg, #0b0c10 0%, #050608 100%)");
            } else {
                document.documentElement.style.setProperty("--screen-bg", "radial-gradient(circle at 50% 18%, rgba(60, 89, 148, 0.16), transparent 28%), linear-gradient(180deg, #0b0c10 0%, #050608 100%)");
            }
            showPreviewToast("Tema aplicado");
            return;
        }

        const liveAnnounce = event.target.closest("[data-live-announce]");
        if (liveAnnounce) {
            state.liveAnnouncement = "Anuncio global enviado pela malha live";
            const copy = document.getElementById("opsStatusCopy");
            if (copy) {
                copy.textContent = state.liveAnnouncement;
            }
            showPreviewToast("Anuncio disparado");
            return;
        }

        const commandButton = event.target.closest("[data-command]");
        if (commandButton) {
            dispatchCommand(commandButton.dataset.command, "Acao disparada");
            return;
        }

        const likeButton = event.target.closest("[data-like-post]");
        if (likeButton) {
            const postId = likeButton.dataset.likePost;
            if (state.likedPosts.has(postId)) {
                state.likedPosts.delete(postId);
            } else {
                state.likedPosts.add(postId);
            }
            renderCurrentScreen();
            renderRecents();
            return;
        }

        const bankTabButton = event.target.closest("[data-bank-tab]");
        if (bankTabButton) {
            state.bankTab = bankTabButton.dataset.bankTab;
            renderCurrentScreen();
            return;
        }

        const bankToggle = event.target.closest("[data-bank-toggle]");
        if (bankToggle) {
            state.bankBalanceVisible = !state.bankBalanceVisible;
            renderCurrentScreen();
        }
    });

    document.addEventListener("submit", (event) => {
        const form = event.target.closest("[data-chat-form]");
        if (!form) {
            return;
        }

        event.preventDefault();
        const input = form.querySelector("input");
        if (!input) {
            return;
        }

        const value = input.value.trim();
        if (!value) {
            return;
        }

        const list = whatsappMessages[state.activeChatId] || [];
        list.push({ from: "me", text: value, time: "agora" });
        whatsappMessages[state.activeChatId] = list;
        input.value = "";
        renderCurrentScreen();
    });

    window.XyronHydrate = () => {
        overlayVisible = document.documentElement.dataset.xyronVisible !== "0";
        refreshClock(true);
        syncRuntimeHud(true);
        requestAnimationFrame(() => logRuntimeMetrics("hydrate"));
    };

    window.addEventListener("resize", () => {
        applyStageScale();
        if (!isPreview) {
            requestAnimationFrame(() => logRuntimeMetrics("resize"));
        }
    });

    window.addEventListener("xyron:live-status", (event) => {
        const connected = !!(event.detail && event.detail.connected);
        state.liveAnnouncement = connected
            ? "WebSocket conectado: anuncios e temas em tempo real"
            : "Hot-reload em espera. Fallback por polling ativo.";
        syncRuntimeHud();
        const ops = document.getElementById("opsStatusCopy");
        if (ops) {
            ops.textContent = state.liveAnnouncement;
        }
    });

    window.addEventListener("xyron:announcement", (event) => {
        const message = (event.detail && event.detail.message) || "Atualizacao live recebida";
        state.liveAnnouncement = message;
        syncRuntimeHud();
        showPreviewToast(message);
        const ops = document.getElementById("opsStatusCopy");
        if (ops) {
            ops.textContent = message;
        }
    });

    window.addEventListener("xyron:voice-result", (event) => {
        const detail = event.detail || {};
        const intent = detail.intent || {};
        const transcript = detail.transcript || "";
        if (intent.kind === "screen" && intent.value) {
            openScreen(intent.value);
        }
        if (intent.kind === "inventory") {
            openInventory();
        }
        if (transcript) {
            showPreviewToast(`Voz: ${transcript}`);
        }
    });

    window.addEventListener("xyron:voice-error", () => {
        showPreviewToast("Voz indisponivel agora");
    });

    window.XyronOverlayVisibilityChanged = handleOverlayVisibilityChange;
    renderHome();
    render();
    applyStageScale();
    handleOverlayVisibilityChange(document.documentElement.dataset.xyronVisible !== "0");
    enablePreviewHotReload();
    setInterval(refreshClock, 30000);
    requestAnimationFrame(() => logRuntimeMetrics("boot"));
</script>
</body>
</html>
